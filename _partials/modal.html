<!-- Feedback Modal — paste before </body> on every document page -->
<div id="feedback-modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-label="Leave feedback">
  <div class="bg-white rounded-t-2xl shadow-xl w-full relative">
    <button
      id="feedback-modal-close"
      onclick="closeModal()"
      class="absolute top-3 right-4 text-gray-400 hover:text-gray-700 text-2xl font-bold leading-none"
      aria-label="Close feedback form"
    >&times;</button>
    <iframe
      id="feedback-iframe"
      src=""
      width="100%"
      height="520"
      frameborder="0"
      class="rounded-lg"
      title="Feedback form"
    ></iframe>
  </div>
</div>
<script src="/js/modal.js"></script>
