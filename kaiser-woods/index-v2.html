<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A walk through the Kaiser Woods Trail access story — scroll to stroll." />
  <title>Kaiser Woods Trail</title>
  <link rel="stylesheet" href="css/trail-v2.css" />
</head>
<body>

  <!-- Tall element that provides scroll distance — height set by JS -->
  <div id="scroll-proxy"></div>

  <!-- Fixed viewport stage — all scenes live here -->
  <div id="stage">

    <!-- Trail ground (Task 2) -->
    <div id="trail-ground" aria-hidden="true">
      <svg viewBox="0 0 1440 1200" preserveAspectRatio="xMidYMid slice"
           xmlns="http://www.w3.org/2000/svg">
        <!-- Trail fill shape -->
        <path id="trail-ground-fill"
          d="M 500,0
             C 500,200 900,300 800,600
             C 700,900 200,1000 400,1200
             L 1440,1200 L 1440,0 Z" />
        <!-- Trail center line -->
        <path id="trail-ground-line"
          d="M 650,0
             C 650,200 900,300 800,600
             C 700,900 300,1000 500,1200" />
      </svg>
    </div>

    <!-- Scenes (Task 3) -->

    <!-- HERO -->
    <div class="scene" id="s-hero">
      <div class="scene__items">
        <div class="scene__item scene__item--eyebrow">Walk with me and let's talk about</div>
        <div class="scene__item scene__item--hero">Kaiser Woods<br>Trail</div>
        <div class="scene__item scene__item--sub">Scroll to stroll</div>
      </div>
    </div>

    <!-- remaining scenes added in Task 3 -->

  </div>

  <!-- GSAP CDN -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="js/trail-v2.js"></script>
</body>
</html>
