<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaiser Woods Trail</title>
  <link rel="stylesheet" href="css/trail.css" />
</head>
<body>

  <div id="kaiser-page">

    <!-- Full-page trail SVG — sits behind all content -->
    <svg id="trail-svg"
         viewBox="0 0 1440 6000"
         preserveAspectRatio="xMidYMid slice"
         xmlns="http://www.w3.org/2000/svg"
         aria-hidden="true">

      <!-- Trail fill (light olive grass shape) -->
      <path id="trail-fill"
        d="M 400,0
           C 400,400 900,600 800,1200
           C 700,1800 200,2000 300,2600
           C 400,3200 1000,3400 900,4000
           C 800,4600 300,4800 400,5400
           C 450,5700 600,5900 700,6000
           L 1440,6000 L 1440,0 Z"
        fill="var(--trail)"
        opacity="0.45"
      />

      <!-- Trail path line (draws itself on scroll) -->
      <path id="trail-line"
        d="M 600,0
           C 600,400 900,600 800,1200
           C 700,1800 200,2000 300,2600
           C 400,3200 1000,3400 900,4000
           C 800,4600 300,4800 400,5400
           C 450,5700 650,5900 720,6000"
        fill="none"
        stroke="var(--trail-dark)"
        stroke-width="6"
        stroke-linecap="round"
      />
    </svg>

    <!-- ===================== HERO ===================== -->
    <section id="hero">
      <p class="hero__eyebrow">Walk with me and let's talk about</p>
      <h1 class="hero__title">Kaiser Woods<br>Trail</h1>
      <p class="hero__scroll-cue">Scroll to stroll</p>
    </section>

    <!-- CHAPTER: Background -->
    <section class="chapter" id="ch-background">
      <p class="chapter__label reveal">Background</p>
      <div class="chapter__main">
        <h2 class="chapter__heading reveal">We actually have a lot of<br>information about the trail.</h2>
        <p class="reveal">A background document sums up key points from primary sources.</p>
        <p class="annotation">Let's go to July &rarr;</p>
      </div>
      <div class="chapter__peek">Now the Marj Young Park —<br>70 acres of woodland.</div>
    </section>

  </div>

  <!-- GSAP CDN -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="js/trail.js"></script>

  <div id="progress-indicator" aria-hidden="true">
    <svg width="24" height="120" viewBox="0 0 24 120">
      <line x1="12" y1="4" x2="12" y2="116" stroke="var(--trail)" stroke-width="2" stroke-dasharray="4 4"/>
    </svg>
    <div id="progress-dot"></div>
  </div>
</body>
</html>
